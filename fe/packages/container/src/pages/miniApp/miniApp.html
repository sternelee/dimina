<div class="dimina-mini-app">
	<!-- 右上方药丸按钮 -->
	<ul class="dimina-mini-app-navigation__actions">
		<li class="dimina-mini-app-navigation__actions-variable"></li>
		<li class="dimina-mini-app-navigation__actions-close"></li>
	</ul>

	<!-- webview挂载节点 -->
	<div class="dimina-mini-app__webviews"></div>

	<!-- 启动loading页面 -->
	<div class="dimina-mini-app__launch-screen">
		<div class="dimina-mini-app__launch-screen-content">
			<div class="dimina-mini-app__logo">
				<div class="dimina-mini-app__logo-img">
					<img class="dimina-mini-app__logo-img-url" alt="logo" />
				</div>
				<div class="dimina-mini-app__logo-circle"></div>
				<span class="dimina-mini-app__green-point"></span>
			</div>
			<h1 class="dimina-mini-app__name"></h1>
		</div>
	</div>

	<div class="dimina-mini-app-menu__mask"></div>
	<div class="dimina-mini-app-menu">
		<div class="dimina-mini-app-menu__handle"></div>
		<div class="dimina-mini-app-menu__app">
			<div class="dimina-mini-app-menu__app-logo">
				<img class="dimina-mini-app-menu__app-logo-img" alt="logo" />
			</div>
			<div class="dimina-mini-app-menu__app-meta">
				<h2 class="dimina-mini-app-menu__app-name"></h2>
				<p class="dimina-mini-app-menu__app-id"></p>
				<p class="dimina-mini-app-menu__app-desc"></p>
			</div>
		</div>
		<div class="dimina-mini-app-menu__quick-actions"></div>
		<div class="dimina-mini-app-menu__footer">
			<button type="button" class="dimina-mini-app-menu__footer-btn dimina-mini-app-menu__footer-btn--cancel">取消</button>
		</div>
	</div>
</div>
