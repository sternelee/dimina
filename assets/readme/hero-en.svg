<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="420" viewBox="0 0 1200 420" role="img" aria-labelledby="title desc">
  <title id="title">Dimina cross-platform mini program runtime</title>
  <desc id="desc">Didi's open-source runtime compiles WXML, WXSS, and JavaScript with DMCC for Android, iOS, Harmony, and Web.</desc>

