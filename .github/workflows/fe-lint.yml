name: Frontend Lint

on:
  # Fork code must run in the pull request's restricted security context.
  pull_request:
    paths:
      - 'fe/**'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  lint:
    name: Run Frontend Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: lts/*

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10.29.2
          run_install: false

      - name: Get pnpm store directory
        id: pnpm-cache
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path)" >> $GITHUB_OUTPUT

      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('fe/pnpm-lock.yaml') }}

      - name: Install dependencies
        working-directory: ./fe
        run: pnpm install --frozen-lockfile --ignore-scripts --ignore-pnpmfile

      - name: Run linter
        working-directory: ./fe
        run: ./node_modules/.bin/oxlint
